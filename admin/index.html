<!DOCTYPE html>
<html lang="it" class="dark" style="color-scheme: dark;">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark">
<meta name="robots" content="noindex, nofollow">
<title>Admin · Cascina Fontana</title>
<link rel="icon" type="image/jpeg" sizes="128x128" href="/public/images/flash_128.jpg">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: { extend: {
      colors: {
        primary: '#c7a763', 'primary-dark': '#a8894a',
        'dark-bg': '#0d0d0b', 'dark-card': '#17170f',
        'dark-text': '#f4f1e6', 'dark-muted': '#8a867a',
        'dark-border': '#2a2920'
      },
      fontFamily: {
        sans: ['DM Sans','system-ui','sans-serif'],
        heading: ['Space Grotesk','DM Sans','sans-serif']
      }
    } }
  };
</script>
<style>
  body { font-family: 'DM Sans', system-ui, sans-serif; background: #0d0d0b; color: #f4f1e6; }
  .font-heading { font-family: 'Space Grotesk','DM Sans',sans-serif; letter-spacing: -0.02em; }
  .gradient-text {
    background: linear-gradient(135deg, #e8c97a 0%, #c7a763 40%, #9ab574 100%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent; color: transparent;
  }
  .glass {
    background: rgba(23, 23, 15, 0.65);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(199, 167, 99, 0.12);
  }
  input, select, textarea { color-scheme: dark; }
</style>
</head>
<body class="min-h-screen bg-dark-bg text-dark-text">

<!-- Top bar -->
<header class="sticky top-0 z-40 bg-dark-bg/90 backdrop-blur border-b border-dark-border">
  <div class="max-w-6xl mx-auto px-4 sm:px-6 py-3 flex items-center justify-between">
    <a href="/" class="flex items-center gap-2 group">
      <span class="w-8 h-8 rounded-lg bg-gradient-to-br from-primary to-primary-dark flex items-center justify-center font-heading font-bold text-dark-bg text-xs">CF</span>
      <span class="font-heading font-bold text-sm group-hover:text-primary transition">Admin · Cascina Fontana</span>
    </a>
    <div class="flex items-center gap-3 text-xs">
      <span id="userEmail" class="text-dark-muted hidden sm:inline"></span>
      <button id="logoutBtn" class="px-3 py-1.5 rounded-lg bg-dark-card border border-dark-border hover:border-primary hover:text-primary transition">Esci</button>
    </div>
  </div>
</header>

<main class="max-w-6xl mx-auto px-4 sm:px-6 py-8 space-y-8">

  <!-- Boot loader -->
  <div id="bootLoader" class="text-center text-dark-muted py-20">Verifica sessione…</div>

  <div id="adminRoot" class="hidden space-y-8">

    <!-- Form create/edit -->
    <section class="glass rounded-2xl p-5 sm:p-6">
      <div class="flex items-center justify-between mb-5 flex-wrap gap-3">
        <div>
          <div class="text-xs font-medium text-primary tracking-widest">ANNUNCI</div>
          <h2 id="formTitle" class="font-heading text-2xl font-bold">Nuovo <span class="gradient-text">annuncio</span></h2>
        </div>
        <button id="cancelEditBtn" class="hidden px-3 py-1.5 text-xs rounded-lg border border-dark-border hover:border-primary hover:text-primary transition">Annulla modifica</button>
      </div>

      <form id="listingForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <input type="hidden" id="listingId" name="id">

        <div class="md:col-span-2">
          <label class="block text-xs font-medium text-dark-muted mb-1">Titolo *</label>
          <input type="text" id="title" name="title" required maxlength="200"
            class="w-full px-3 py-2.5 rounded-lg bg-dark-bg border border-dark-border focus:border-primary focus:outline-none transition">
        </div>

        <div>
          <label class="block text-xs font-medium text-dark-muted mb-1">Prezzo</label>
          <input type="text" id="price" name="price" placeholder="€ 14.500 · € 18/ql · Su richiesta"
            class="w-full px-3 py-2.5 rounded-lg bg-dark-bg border border-dark-border focus:border-primary focus:outline-none transition">
        </div>

        <div>
          <label class="block text-xs font-medium text-dark-muted mb-1">Categoria *</label>
          <select id="category" name="category" required
            class="w-full px-3 py-2.5 rounded-lg bg-dark-bg border border-dark-border focus:border-primary focus:outline-none transition">
            <option value="macchine">Macchinari</option>
            <option value="prodotti">Prodotti</option>
            <option value="materiali">Materiali</option>
          </select>
        </div>

        <div class="md:col-span-2">
          <label class="block text-xs font-medium text-dark-muted mb-1">Descrizione</label>
          <textarea id="description" name="description" rows="3" maxlength="2000"
            class="w-full px-3 py-2.5 rounded-lg bg-dark-bg border border-dark-border focus:border-primary focus:outline-none transition resize-none"></textarea>
        </div>

        <div>
          <label class="block text-xs font-medium text-dark-muted mb-1">Stato</label>
          <select id="status" name="status"
            class="w-full px-3 py-2.5 rounded-lg bg-dark-bg border border-dark-border focus:border-primary focus:outline-none transition">
            <option value="available">Disponibile</option>
            <option value="sold">Venduto</option>
          </select>
        </div>

        <div>
          <label class="block text-xs font-medium text-dark-muted mb-1">Immagine (URL)</label>
          <input type="url" id="image_url" name="image_url" placeholder="https://… oppure carica sotto"
            class="w-full px-3 py-2.5 rounded-lg bg-dark-bg border border-dark-border focus:border-primary focus:outline-none transition">
        </div>

        <div class="md:col-span-2">
          <label class="block text-xs font-medium text-dark-muted mb-1">Oppure carica un file</label>
          <div class="flex items-center gap-3 flex-wrap">
            <input type="file" id="imageFile" accept="image/*"
              class="text-sm text-dark-muted file:mr-3 file:px-3 file:py-2 file:rounded-lg file:border-0 file:bg-primary file:text-dark-bg file:font-medium file:cursor-pointer hover:file:bg-primary-dark">
            <span id="uploadStatus" class="text-xs text-dark-muted"></span>
          </div>
          <div id="imagePreview" class="mt-3 hidden">
            <img id="imagePreviewImg" class="w-32 h-32 object-cover rounded-lg border border-dark-border" alt="Anteprima">
          </div>
        </div>

        <div id="formError" class="hidden md:col-span-2 text-sm text-red-400 bg-red-500/10 border border-red-500/20 rounded-lg px-3 py-2"></div>

        <div class="md:col-span-2 flex items-center gap-3">
          <button type="submit" id="saveBtn"
            class="px-6 py-3 rounded-xl bg-primary text-dark-bg font-semibold hover:bg-primary-dark transition-all shadow-lg shadow-primary/20 disabled:opacity-50">
            Salva annuncio
          </button>
          <button type="reset" id="resetBtn"
            class="px-6 py-3 rounded-xl border border-dark-border hover:border-primary hover:text-primary transition">
            Pulisci
          </button>
        </div>
      </form>
    </section>

    <!-- Listings table -->
    <section class="glass rounded-2xl p-5 sm:p-6">
      <div class="flex items-center justify-between mb-5 flex-wrap gap-3">
        <div>
          <div class="text-xs font-medium text-primary tracking-widest">ESISTENTI</div>
          <h2 class="font-heading text-2xl font-bold">Annunci <span id="countBadge" class="text-dark-muted text-base font-normal"></span></h2>
        </div>
        <button id="refreshBtn" class="text-xs px-3 py-1.5 rounded-lg border border-dark-border hover:border-primary hover:text-primary transition">↻ Aggiorna</button>
      </div>

      <div id="listingsContainer" class="space-y-3">
        <div class="text-center text-dark-muted py-6 text-sm">Caricamento…</div>
      </div>
    </section>

  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/supabase-client.js"></script>
<script src="/admin/admin.js"></script>

</body>
</html>
