<!DOCTYPE html>
<html lang="it" style="color-scheme: light;">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light">
<meta name="robots" content="noindex, nofollow">
<title>Admin · Cascina Fontana</title>
<link rel="icon" type="image/jpeg" sizes="128x128" href="/public/images/flash_128.jpg">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: { extend: {
      colors: {
        primary: '#6f8b57', 'primary-dark': '#557244',
        'dark-bg': '#f4f7ef', 'dark-card': '#ffffff',
        'dark-text': '#2f3b2d', 'dark-muted': '#657060',
        'dark-border': '#d7dfcd'
      },
      fontFamily: {
        sans: ['DM Sans','system-ui','sans-serif'],
        heading: ['Space Grotesk','DM Sans','sans-serif']
      }
    } }
  };
</script>
<style>
  body { font-family: 'DM Sans', system-ui, sans-serif; background: #f4f7ef; color: #2f3b2d; }
  .font-heading { font-family: 'Space Grotesk','DM Sans',sans-serif; letter-spacing: -0.02em; }
  .gradient-text {
    background: linear-gradient(135deg, #8da776 0%, #6f8b57 45%, #4f6841 100%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent; color: transparent;
  }
  .glass {
    background: rgba(255, 255, 255, 0.82);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(111, 139, 87, 0.22);
  }
  input, select, textarea { color-scheme: light; }
  .tab-btn { transition: all .2s; }
  .tab-btn.active { background: rgba(111, 139, 87, 0.14); color: #557244; border-color: rgba(111, 139, 87, 0.38); }
  .thumb { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; border: 1px solid #d7dfcd; }
  .toast {
    position: fixed; bottom: 24px; right: 24px; z-index: 100;
    padding: 12px 18px; border-radius: 12px;
    background: rgba(255, 255, 255, 0.96); backdrop-filter: blur(12px);
    border: 1px solid rgba(111, 139, 87, 0.3);
    box-shadow: 0 8px 32px rgba(47,59,45,0.14);
    opacity: 0; transform: translateY(8px); transition: all .3s ease;
    max-width: 360px;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.success { border-color: rgba(34, 197, 94, 0.4); }
  .toast.error { border-color: rgba(239, 68, 68, 0.4); }
</style>
</head>
<body class="min-h-screen bg-dark-bg text-dark-text">

<!-- Top bar -->
<header class="sticky top-0 z-40 bg-dark-bg/90 backdrop-blur border-b border-dark-border shadow-sm shadow-primary/5">
  <div class="max-w-6xl mx-auto px-4 sm:px-6 py-3 flex items-center justify-between flex-wrap gap-3">
    <a href="/" class="flex items-center gap-2 group">
      <span class="w-8 h-8 rounded-lg bg-gradient-to-br from-primary to-primary-dark flex items-center justify-center font-heading font-bold text-white text-xs">CF</span>
      <span class="font-heading font-bold text-sm group-hover:text-primary transition">Admin · Cascina Fontana</span>
    </a>
    <div class="flex items-center gap-3 text-xs">
      <span id="userEmail" class="text-dark-muted hidden sm:inline"></span>
      <button id="logoutBtn" class="px-3 py-1.5 rounded-lg bg-dark-card border border-dark-border hover:border-primary hover:text-primary transition">Esci</button>
    </div>
  </div>
</header>

<main class="max-w-6xl mx-auto px-4 sm:px-6 py-8 space-y-6">

  <!-- Boot loader -->
  <div id="bootLoader" class="text-center text-dark-muted py-20">Verifica sessione…</div>

  <div id="adminRoot" class="hidden space-y-6">

    <!-- Tabs -->
    <nav class="flex items-center gap-2 glass rounded-xl p-1 w-fit">
      <button data-tab="listings" class="tab-btn active px-4 py-2 rounded-lg text-sm font-medium border border-transparent">Annunci</button>
      <button data-tab="updates"  class="tab-btn px-4 py-2 rounded-lg text-sm font-medium border border-transparent">Aggiornamenti</button>
    </nav>

    <!-- ============================================== -->
    <!-- TAB: LISTINGS                                  -->
    <!-- ============================================== -->
    <div id="tab-listings" class="space-y-6">

      <!-- Listings form -->
      <section class="glass rounded-2xl p-5 sm:p-6">
        <div class="flex items-center justify-between mb-5 flex-wrap gap-3">
          <div>
            <div class="text-xs font-medium text-primary tracking-widest">ANNUNCI</div>
            <h2 id="listingFormTitle" class="font-heading text-2xl font-bold">Nuovo <span class="gradient-text">annuncio</span></h2>
          </div>
          <button id="listingCancelEdit" class="hidden px-3 py-1.5 text-xs rounded-lg border border-dark-border hover:border-primary hover:text-primary transition">Annulla modifica</button>
        </div>

        <form id="listingForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <input type="hidden" id="l_id">

          <div class="md:col-span-2">
            <label class="block text-xs font-medium text-dark-muted mb-1">Titolo *</label>
            <input type="text" id="l_title" required maxlength="200"
              class="w-full px-3 py-2.5 rounded-lg bg-dark-bg border border-dark-border focus:border-primary focus:outline-none transition">
          </div>

          <div>
            <label class="block text-xs font-medium text-dark-muted mb-1">Categoria</label>
            <select id="l_category"
              class="w-full px-3 py-2.5 rounded-lg bg-dark-bg border border-dark-border focus:border-primary focus:outline-none transition">
              <option value="macchine">Macchinari</option>
              <option value="prodotti">Prodotti</option>
              <option value="materiali">Materiali</option>
            </select>
          </div>

          <div>
            <label class="block text-xs font-medium text-dark-muted mb-1">Marca</label>
            <input type="text" id="l_brand" class="w-full px-3 py-2.5 rounded-lg bg-dark-bg border border-dark-border focus:border-primary focus:outline-none transition">
          </div>

          <div>
            <label class="block text-xs font-medium text-dark-muted mb-1">Modello</label>
            <input type="text" id="l_model" class="w-full px-3 py-2.5 rounded-lg bg-dark-bg border border-dark-border focus:border-primary focus:outline-none transition">
          </div>

          <div>
            <label class="block text-xs font-medium text-dark-muted mb-1">Cilindrata</label>
            <input type="text" id="l_displacement" placeholder="es. 2500 cc" class="w-full px-3 py-2.5 rounded-lg bg-dark-bg border border-dark-border focus:border-primary focus:outline-none transition">
          </div>

          <div>
            <label class="block text-xs font-medium text-dark-muted mb-1">Cavalli (HP)</label>
            <input type="text" id="l_hp" placeholder="es. 85 CV" class="w-full px-3 py-2.5 rounded-lg bg-dark-bg border border-dark-border focus:border-primary focus:outline-none transition">
          </div>

          <div>
            <label class="block text-xs font-medium text-dark-muted mb-1">Alimentazione</label>
            <select id="l_fuel"
              class="w-full px-3 py-2.5 rounded-lg bg-dark-bg border border-dark-border focus:border-primary focus:outline-none transition">
              <option value="">—</option>
              <option value="diesel">Diesel</option>
              <option value="benzina">Benzina</option>
              <option value="gpl">GPL</option>
              <option value="metano">Metano</option>
              <option value="elettrico">Elettrico</option>
              <option value="ibrido">Ibrido</option>
              <option value="altro">Altro</option>
            </select>
          </div>

          <div>
            <label class="block text-xs font-medium text-dark-muted mb-1">Ore di utilizzo</label>
            <input type="text" id="l_usage_hours" placeholder="es. 4200 h" class="w-full px-3 py-2.5 rounded-lg bg-dark-bg border border-dark-border focus:border-primary focus:outline-none transition">
          </div>

          <div>
            <label class="block text-xs font-medium text-dark-muted mb-1">Condizione</label>
            <select id="l_condition"
              class="w-full px-3 py-2.5 rounded-lg bg-dark-bg border border-dark-border focus:border-primary focus:outline-none transition">
              <option value="">—</option>
              <option value="nuovo">Nuovo</option>
              <option value="ottimo">Ottimo</option>
              <option value="buono">Buono</option>
              <option value="discreto">Discreto</option>
              <option value="da_revisionare">Da revisionare</option>
            </select>
          </div>

          <div>
            <label class="block text-xs font-medium text-dark-muted mb-1">Colore</label>
            <input type="text" id="l_color" class="w-full px-3 py-2.5 rounded-lg bg-dark-bg border border-dark-border focus:border-primary focus:outline-none transition">
          </div>

          <div class="md:col-span-2 grid grid-cols-1 sm:grid-cols-3 gap-3">
            <label class="flex items-center gap-2 text-sm bg-dark-bg border border-dark-border rounded-lg px-3 py-2.5 cursor-pointer hover:border-primary transition">
              <input type="checkbox" id="l_registered" class="accent-primary">
              <span>Immatricolato</span>
            </label>
            <label class="flex items-center gap-2 text-sm bg-dark-bg border border-dark-border rounded-lg px-3 py-2.5 cursor-pointer hover:border-primary transition">
              <input type="checkbox" id="l_documents" class="accent-primary">
              <span>Documenti</span>
            </label>
            <label class="flex items-center gap-2 text-sm bg-dark-bg border border-dark-border rounded-lg px-3 py-2.5 cursor-pointer hover:border-primary transition">
              <input type="checkbox" id="l_insured" class="accent-primary">
              <span>Assicurato</span>
            </label>
          </div>

          <div class="md:col-span-2">
            <label class="block text-xs font-medium text-dark-muted mb-1">Immagini (più file — compressione automatica)</label>
            <input type="file" id="l_images" accept="image/*" multiple
              class="text-sm text-dark-muted file:mr-3 file:px-3 file:py-2 file:rounded-lg file:border-0 file:bg-primary file:text-dark-bg file:font-medium file:cursor-pointer hover:file:bg-primary-dark">
            <div id="l_imagesPreview" class="mt-3 flex flex-wrap gap-2"></div>
            <p id="l_uploadStatus" class="text-xs text-dark-muted mt-2"></p>
          </div>

          <div id="l_formError" class="hidden md:col-span-2 text-sm text-red-400 bg-red-500/10 border border-red-500/20 rounded-lg px-3 py-2"></div>

          <div class="md:col-span-2 flex items-center gap-3 flex-wrap">
            <button type="submit" id="l_saveBtn"
              class="px-6 py-3 rounded-xl bg-primary text-white font-semibold hover:bg-primary-dark transition-all shadow-lg shadow-primary/20 disabled:opacity-50">
              Salva annuncio
            </button>
            <button type="reset" id="l_resetBtn"
              class="px-6 py-3 rounded-xl border border-dark-border hover:border-primary hover:text-primary transition">
              Pulisci
            </button>
          </div>
        </form>
      </section>

      <!-- Listings list -->
      <section class="glass rounded-2xl p-5 sm:p-6">
        <div class="flex items-center justify-between mb-5 flex-wrap gap-3">
          <h2 class="font-heading text-xl font-bold">Annunci esistenti <span id="l_count" class="text-dark-muted text-sm font-normal"></span></h2>
          <button id="l_refreshBtn" class="text-xs px-3 py-1.5 rounded-lg border border-dark-border hover:border-primary hover:text-primary transition">↻ Aggiorna</button>
        </div>
        <div id="listingsContainer" class="space-y-3">
          <div class="text-center text-dark-muted py-6 text-sm">Caricamento…</div>
        </div>
      </section>
    </div>

    <!-- ============================================== -->
    <!-- TAB: UPDATES                                   -->
    <!-- ============================================== -->
    <div id="tab-updates" class="hidden space-y-6">

      <!-- Updates form -->
      <section class="glass rounded-2xl p-5 sm:p-6">
        <div class="flex items-center justify-between mb-5 flex-wrap gap-3">
          <div>
            <div class="text-xs font-medium text-primary tracking-widest">AGGIORNAMENTI</div>
            <h2 id="updateFormTitle" class="font-heading text-2xl font-bold">Nuovo <span class="gradient-text">aggiornamento</span></h2>
          </div>
          <button id="updateCancelEdit" class="hidden px-3 py-1.5 text-xs rounded-lg border border-dark-border hover:border-primary hover:text-primary transition">Annulla modifica</button>
        </div>

        <form id="updateForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <input type="hidden" id="u_id">

          <div class="md:col-span-2">
            <label class="block text-xs font-medium text-dark-muted mb-1">Titolo *</label>
            <input type="text" id="u_title" required maxlength="200"
              class="w-full px-3 py-2.5 rounded-lg bg-dark-bg border border-dark-border focus:border-primary focus:outline-none transition">
          </div>

          <div class="md:col-span-2">
            <label class="block text-xs font-medium text-dark-muted mb-1">Descrizione</label>
            <textarea id="u_description" rows="4" maxlength="4000"
              class="w-full px-3 py-2.5 rounded-lg bg-dark-bg border border-dark-border focus:border-primary focus:outline-none transition resize-none"></textarea>
          </div>

          <div>
            <label class="block text-xs font-medium text-dark-muted mb-1">Città</label>
            <input type="text" id="u_city" class="w-full px-3 py-2.5 rounded-lg bg-dark-bg border border-dark-border focus:border-primary focus:outline-none transition">
          </div>

          <div>
            <label class="block text-xs font-medium text-dark-muted mb-1">Paese</label>
            <input type="text" id="u_country" class="w-full px-3 py-2.5 rounded-lg bg-dark-bg border border-dark-border focus:border-primary focus:outline-none transition">
          </div>

          <div class="md:col-span-2">
            <label class="block text-xs font-medium text-dark-muted mb-1">Immagini (più file — compressione automatica)</label>
            <input type="file" id="u_images" accept="image/*" multiple
              class="text-sm text-dark-muted file:mr-3 file:px-3 file:py-2 file:rounded-lg file:border-0 file:bg-primary file:text-dark-bg file:font-medium file:cursor-pointer hover:file:bg-primary-dark">
            <div id="u_imagesPreview" class="mt-3 flex flex-wrap gap-2"></div>
            <p id="u_uploadStatus" class="text-xs text-dark-muted mt-2"></p>
          </div>

          <div id="u_formError" class="hidden md:col-span-2 text-sm text-red-400 bg-red-500/10 border border-red-500/20 rounded-lg px-3 py-2"></div>

          <div class="md:col-span-2 flex items-center gap-3 flex-wrap">
            <button type="submit" id="u_saveBtn"
              class="px-6 py-3 rounded-xl bg-primary text-white font-semibold hover:bg-primary-dark transition-all shadow-lg shadow-primary/20 disabled:opacity-50">
              Salva aggiornamento
            </button>
            <button type="reset" id="u_resetBtn"
              class="px-6 py-3 rounded-xl border border-dark-border hover:border-primary hover:text-primary transition">
              Pulisci
            </button>
          </div>
        </form>
      </section>

      <!-- Updates list -->
      <section class="glass rounded-2xl p-5 sm:p-6">
        <div class="flex items-center justify-between mb-5 flex-wrap gap-3">
          <h2 class="font-heading text-xl font-bold">Aggiornamenti pubblicati <span id="u_count" class="text-dark-muted text-sm font-normal"></span></h2>
          <button id="u_refreshBtn" class="text-xs px-3 py-1.5 rounded-lg border border-dark-border hover:border-primary hover:text-primary transition">↻ Aggiorna</button>
        </div>
        <div id="updatesContainer" class="space-y-3">
          <div class="text-center text-dark-muted py-6 text-sm">Caricamento…</div>
        </div>
      </section>
    </div>

  </div>
</main>

<div id="toast" class="toast" role="status" aria-live="polite"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/supabase-client.js"></script>
<script src="/admin/admin.js"></script>

</body>
</html>
