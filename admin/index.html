<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Cascina Fontana</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:      #18E299;
      --green-dark: #0fb87d;
      --bg:         #f5f5f3;
      --surface:    #ffffff;
      --border:     #e5e7eb;
      --text:       #1a1a1a;
      --muted:      #6b7280;
      --danger:     #ef4444;
      --danger-dk:  #dc2626;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── LOGIN ── */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }

    .login-card {
      background: var(--surface);
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
    }

    .login-brand { text-align: center; margin-bottom: 2rem; }
    .login-brand h1 { font-size: 1.25rem; font-weight: 600; }
    .login-brand p  { font-size: .85rem; color: var(--muted); margin-top: .25rem; }

    /* ── FORMS ── */
    .field { margin-bottom: 1rem; }
    .field label {
      display: block;
      font-size: .75rem;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: .35rem;
    }
    .field input,
    .field select,
    .field textarea {
      width: 100%;
      padding: .65rem .85rem;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: .95rem;
      font-family: inherit;
      color: var(--text);
      background: var(--surface);
      outline: none;
      transition: border-color .15s;
    }
    .field input:focus,
    .field select:focus,
    .field textarea:focus { border-color: var(--green); }
    .field textarea { resize: vertical; min-height: 80px; }

    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      padding: .65rem 1.25rem;
      border: none;
      border-radius: 8px;
      font-size: .9rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: opacity .15s, background .15s, border-color .15s;
    }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn-full     { width: 100%; justify-content: center; }

    .btn-primary   { background: var(--green); color: #000; }
    .btn-primary:hover:not(:disabled) { background: var(--green-dark); }

    .btn-secondary { background: var(--border); color: var(--text); }
    .btn-secondary:hover:not(:disabled) { background: #d1d5db; }

    .btn-danger    { background: var(--danger); color: #fff; }
    .btn-danger:hover:not(:disabled) { background: var(--danger-dk); }

    .btn-ghost { background: transparent; color: var(--muted); border: 1.5px solid var(--border); }
    .btn-ghost:hover:not(:disabled) { border-color: var(--text); color: var(--text); }

    .error-msg {
      color: var(--danger);
      font-size: .85rem;
      margin-top: .75rem;
      text-align: center;
      min-height: 1.2em;
    }

    /* ── DASHBOARD SHELL ── */
    #admin-app { min-height: 100vh; display: flex; flex-direction: column; }

    .admin-header {
      background: var(--surface);
      border-bottom: 1.5px solid var(--border);
      padding: .9rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .admin-brand { font-weight: 600; font-size: 1rem; }
    .admin-brand span { color: var(--green); }

    .admin-user {
      display: flex;
      align-items: center;
      gap: .75rem;
      font-size: .85rem;
      color: var(--muted);
    }

    .admin-tabs {
      display: flex;
      background: var(--surface);
      border-bottom: 1.5px solid var(--border);
      padding: 0 1.5rem;
    }
    .tab-btn {
      padding: .85rem 1.25rem;
      background: none;
      border: none;
      border-bottom: 2.5px solid transparent;
      font-family: inherit;
      font-size: .9rem;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      margin-bottom: -1.5px;
      transition: color .15s, border-color .15s;
    }
    .tab-btn.active { color: var(--text); border-bottom-color: var(--green); }

    .admin-content {
      flex: 1;
      padding: 1.75rem 1.5rem;
      max-width: 960px;
      margin: 0 auto;
      width: 100%;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }
    .section-title { font-size: 1.1rem; font-weight: 600; }

    /* ── SHOP GRID ── */
    .shop-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1rem;
    }
    .product-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .product-card-img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      background: #f0f0ee;
    }
    .product-card-img-ph {
      width: 100%;
      height: 160px;
      background: #f0f0ee;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 2rem;
    }
    .product-card-body {
      padding: .85rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: .4rem;
    }
    .product-card-title { font-weight: 600; font-size: .95rem; }
    .product-card-meta  { display: flex; align-items: center; gap: .5rem; flex-wrap: wrap; }
    .product-price      { font-weight: 600; color: var(--green-dark); font-size: .95rem; }

    .badge {
      font-size: .72rem;
      font-weight: 500;
      padding: .2rem .55rem;
      border-radius: 100px;
      background: #f0f0ee;
      color: var(--muted);
    }
    .badge-green { background: #dcfce7; color: #166534; }
    .badge-gray  { background: #f3f4f6; color: #6b7280; }

    .product-card-actions {
      padding: .7rem .85rem;
      border-top: 1px solid var(--border);
      display: flex;
      gap: .5rem;
      justify-content: flex-end;
    }

    /* ── NOVITÀ ── */
    .compose-box {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 1.5rem;
    }
    .compose-box .field { margin-bottom: .75rem; }
    .compose-actions { display: flex; justify-content: flex-end; margin-top: .75rem; }

    .post-list { display: flex; flex-direction: column; gap: .75rem; }
    .post-item {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.25rem;
      display: flex;
      gap: 1rem;
      align-items: flex-start;
    }
    .post-date {
      font-size: .78rem;
      color: var(--muted);
      white-space: nowrap;
      padding-top: .15rem;
      min-width: 80px;
    }
    .post-body { flex: 1; }
    .post-title { font-weight: 600; font-size: .95rem; margin-bottom: .25rem; }
    .post-desc  { font-size: .88rem; color: var(--muted); line-height: 1.5; }
    .post-del {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 1.1rem;
      line-height: 1;
      padding: .1rem .2rem;
      transition: color .15s;
      flex-shrink: 0;
    }
    .post-del:hover { color: var(--danger); }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 1rem;
      backdrop-filter: blur(2px);
    }
    .modal {
      background: var(--surface);
      border-radius: 16px;
      width: 100%;
      max-width: 520px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,.2);
    }
    .modal-header {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .modal-title  { font-weight: 600; }
    .modal-close  {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.3rem;
      color: var(--muted);
      line-height: 1;
      padding: .1rem .3rem;
    }
    .modal-close:hover { color: var(--text); }
    .modal-body   { padding: 1.5rem; }
    .modal-footer {
      padding: 1rem 1.5rem;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: .75rem;
    }

    /* ── IMAGE UPLOAD ── */
    .img-upload-area {
      border: 2px dashed var(--border);
      border-radius: 8px;
      padding: 1.25rem;
      text-align: center;
      cursor: pointer;
      transition: border-color .15s;
      margin-bottom: .5rem;
    }
    .img-upload-area:hover { border-color: var(--green); }
    .img-preview {
      width: 100%;
      max-height: 180px;
      object-fit: cover;
      border-radius: 6px;
      margin-bottom: .5rem;
    }
    .img-hint { font-size: .82rem; color: var(--muted); }

    /* ── STATES ── */
    .empty-state { text-align: center; padding: 3rem 1rem; color: var(--muted); }
    .empty-state p { margin-top: .5rem; font-size: .9rem; }

    [hidden] { display: none !important; }
  </style>
</head>
<body>

  <script>
    window.__ENV__ = {
      SUPABASE_URL:  'https://YOUR_PROJECT.supabase.co',
      SUPABASE_ANON: 'YOUR_ANON_KEY',
    };
  </script>

  <!-- ── LOGIN ── -->
  <div id="login-screen">
    <div class="login-card">
      <div class="login-brand">
        <h1>Cascina Fontana</h1>
        <p>Pannello Admin</p>
      </div>
      <form id="login-form" novalidate>
        <div class="field">
          <label for="login-email">Email</label>
          <input id="login-email" type="email" autocomplete="email" required placeholder="admin@cascinafontana.xyz">
        </div>
        <div class="field">
          <label for="login-password">Password</label>
          <input id="login-password" type="password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="login-btn">Accedi</button>
        <p class="error-msg" id="login-error" aria-live="polite"></p>
      </form>
    </div>
  </div>

  <!-- ── DASHBOARD ── -->
  <div id="admin-app" hidden>
    <header class="admin-header">
      <div class="admin-brand">Cascina <span>Fontana</span> &mdash; Admin</div>
      <div class="admin-user">
        <span id="admin-email"></span>
        <button class="btn btn-ghost" id="logout-btn" style="padding:.4rem .85rem;font-size:.82rem">Esci</button>
      </div>
    </header>

    <nav class="admin-tabs" role="tablist">
      <button class="tab-btn active" data-tab="shop" role="tab" aria-selected="true">Shop</button>
      <button class="tab-btn"        data-tab="novita" role="tab" aria-selected="false">Novità</button>
    </nav>

    <div class="admin-content">

      <!-- SHOP TAB -->
      <section id="tab-shop" role="tabpanel">
        <div class="section-header">
          <h2 class="section-title">Prodotti Shop</h2>
          <button class="btn btn-primary" id="btn-new-product">+ Nuovo prodotto</button>
        </div>
        <div class="shop-grid" id="shop-grid"></div>
      </section>

      <!-- NOVITÀ TAB -->
      <section id="tab-novita" role="tabpanel" hidden>
        <div class="section-header">
          <h2 class="section-title">Novità</h2>
        </div>

        <div class="compose-box">
          <div class="field">
            <label for="post-title">Titolo</label>
            <input id="post-title" type="text" placeholder="Titolo del post…">
          </div>
          <div class="field">
            <label for="post-desc">Contenuto</label>
            <textarea id="post-desc" rows="3" placeholder="Scrivi un aggiornamento…"></textarea>
          </div>
          <div class="compose-actions">
            <button class="btn btn-primary" id="btn-publish">Pubblica</button>
          </div>
        </div>

        <div class="post-list" id="post-list"></div>
      </section>

    </div>
  </div>

  <!-- ── MODAL PRODOTTO ── -->
  <div class="modal-overlay" id="product-modal" hidden role="dialog" aria-modal="true" aria-labelledby="modal-title-text">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="modal-title-text">Nuovo prodotto</span>
        <button class="modal-close" id="modal-close" aria-label="Chiudi">&times;</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="product-id">

        <div class="field">
          <label>Immagine</label>
          <div class="img-upload-area" id="img-upload-area" title="Clicca per caricare">
            <img id="img-preview" class="img-preview" src="" alt="" hidden>
            <div id="img-ph">
              <div style="font-size:2rem;margin-bottom:.4rem">📷</div>
              <span class="img-hint">Clicca per caricare un file</span>
            </div>
          </div>
          <input type="file" id="p-image-file" accept="image/*" hidden>
        </div>

        <div class="field">
          <label for="p-image-url">URL immagine (o incolla dopo upload)</label>
          <input id="p-image-url" type="url" placeholder="https://…">
        </div>

        <div class="field-row">
          <div class="field">
            <label for="p-title">Titolo *</label>
            <input id="p-title" type="text" required>
          </div>
          <div class="field">
            <label for="p-price">Prezzo (€) *</label>
            <input id="p-price" type="number" min="0" step="0.01" required>
          </div>
        </div>

        <div class="field-row">
          <div class="field">
            <label for="p-category">Categoria</label>
            <select id="p-category">
              <option value="Prodotti">Prodotti</option>
              <option value="Macchine">Macchine</option>
              <option value="Materiali">Materiali</option>
              <option value="Altro">Altro</option>
            </select>
          </div>
          <div class="field">
            <label for="p-status">Stato</label>
            <select id="p-status">
              <option value="available">Disponibile</option>
              <option value="unavailable">Non disponibile</option>
            </select>
          </div>
        </div>

        <div class="field">
          <label for="p-desc">Descrizione</label>
          <textarea id="p-desc" rows="3"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="modal-cancel">Annulla</button>
        <button class="btn btn-primary"   id="modal-save">Salva</button>
      </div>
    </div>
  </div>

  <script type="module" src="/js/admin.js"></script>
</body>
</html>
