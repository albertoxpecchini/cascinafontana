<!DOCTYPE html>
<html lang="it" class="dark" style="color-scheme: dark;">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark">
<meta name="robots" content="noindex, nofollow">
<title>Admin · Login · Cascina Fontana</title>
<link rel="icon" type="image/jpeg" sizes="128x128" href="/public/images/flash_128.jpg">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: { extend: {
      colors: {
        primary: '#c7a763', 'primary-dark': '#a8894a',
        'dark-bg': '#0d0d0b', 'dark-card': '#17170f',
        'dark-text': '#f4f1e6', 'dark-muted': '#8a867a',
        'dark-border': '#2a2920'
      },
      fontFamily: {
        sans: ['DM Sans','system-ui','sans-serif'],
        heading: ['Space Grotesk','DM Sans','sans-serif']
      }
    } }
  };
</script>
<style>
  body { font-family: 'DM Sans', system-ui, sans-serif; background: #0d0d0b; color: #f4f1e6; }
  .font-heading { font-family: 'Space Grotesk','DM Sans',sans-serif; letter-spacing: -0.02em; }
  .gradient-text {
    background: linear-gradient(135deg, #e8c97a 0%, #c7a763 40%, #9ab574 100%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent; color: transparent;
  }
  .glass {
    background: rgba(23, 23, 15, 0.65);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(199, 167, 99, 0.12);
  }
  .bg-grid {
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -20%, rgba(199, 167, 99, 0.18), transparent),
      linear-gradient(rgba(199, 167, 99, 0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(199, 167, 99, 0.04) 1px, transparent 1px);
    background-size: 100% 100%, 40px 40px, 40px 40px;
  }
</style>
</head>
<body class="min-h-screen flex items-center justify-center bg-dark-bg text-dark-text bg-grid px-4">

<div class="w-full max-w-md">
  <a href="/" class="flex items-center gap-3 justify-center mb-8 group">
    <span class="w-9 h-9 rounded-lg bg-gradient-to-br from-primary to-primary-dark flex items-center justify-center font-heading font-bold text-dark-bg text-sm">CF</span>
    <span class="font-heading font-bold text-lg group-hover:text-primary transition">Cascina Fontana</span>
  </a>

  <div class="glass rounded-2xl p-6 sm:p-8">
    <div class="text-center mb-6">
      <div class="inline-block text-xs font-medium text-primary mb-2 tracking-widest">AREA RISERVATA</div>
      <h1 class="font-heading text-2xl sm:text-3xl font-bold">
        Accedi all'<span class="gradient-text">admin</span>
      </h1>
    </div>

    <form id="loginForm" class="space-y-4" novalidate>
      <div>
        <label for="email" class="block text-xs font-medium text-dark-muted mb-1">Email</label>
        <input type="email" id="email" name="email" required autocomplete="email"
          class="w-full px-3 py-2.5 rounded-lg bg-dark-bg border border-dark-border text-dark-text focus:border-primary focus:outline-none transition">
      </div>
      <div>
        <label for="password" class="block text-xs font-medium text-dark-muted mb-1">Password</label>
        <input type="password" id="password" name="password" required autocomplete="current-password"
          class="w-full px-3 py-2.5 rounded-lg bg-dark-bg border border-dark-border text-dark-text focus:border-primary focus:outline-none transition">
      </div>
      <div id="loginError" class="hidden text-sm text-red-400 bg-red-500/10 border border-red-500/20 rounded-lg px-3 py-2"></div>
      <button type="submit" id="loginBtn"
        class="w-full px-6 py-3 rounded-xl bg-primary text-dark-bg font-semibold hover:bg-primary-dark transition-all shadow-lg shadow-primary/20 disabled:opacity-50">
        Accedi
      </button>
    </form>
  </div>

  <p class="text-center text-xs text-dark-muted mt-6">
    <a href="/" class="hover:text-primary transition">← Torna al sito</a>
  </p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/supabase-client.js"></script>
<script>
  const form  = document.getElementById('loginForm');
  const errEl = document.getElementById('loginError');
  const btn   = document.getElementById('loginBtn');

  function showError(msg) {
    errEl.textContent = msg;
    errEl.classList.remove('hidden');
  }

  // Redirect if already logged
  (async () => {
    if (!window.sb) { showError('Backend non configurato. Vedi js/supabase-client.js'); return; }
    const { data } = await window.sb.auth.getSession();
    if (data.session) window.location.href = '/admin/';
  })();

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errEl.classList.add('hidden');
    if (!window.sb) { showError('Backend non configurato.'); return; }
    btn.disabled = true;
    btn.textContent = 'Accesso…';
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const { error } = await window.sb.auth.signInWithPassword({ email, password });
    if (error) {
      showError(error.message);
      btn.disabled = false;
      btn.textContent = 'Accedi';
      return;
    }
    window.location.href = '/admin/';
  });
</script>

</body>
</html>
