<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Cascina Fontana</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
    }
    .login-container {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      max-width: 400px;
      width: 100%;
    }
    h1 {
      text-align: center;
      margin-bottom: 10px;
      font-size: 2em;
    }
    .logo {
      text-align: center;
      font-size: 3em;
      margin-bottom: 20px;
    }
    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
    }
    input[type="password"] {
      width: 100%;
      padding: 12px;
      border: 2px solid #ddd;
      border-radius: 6px;
      font-size: 1em;
      transition: border-color 0.2s;
    }
    input[type="password"]:focus {
      outline: none;
      border-color: #667eea;
    }
    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 1em;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }
    button:hover {
      transform: translateY(-2px);
    }
    button:active {
      transform: translateY(0);
    }
    .error {
      color: #d32f2f;
      padding: 12px;
      background: #ffebee;
      border-radius: 6px;
      margin-bottom: 20px;
      display: none;
    }
    .back-link {
      text-align: center;
      margin-top: 20px;
    }
    .back-link a {
      color: #667eea;
      text-decoration: none;
      font-size: 0.9em;
    }
    .back-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo">🔐</div>
    <h1>Admin Panel</h1>
    <p class="subtitle">Cascina Fontana</p>

    <div class="error" id="error">PIN non corretto</div>

    <form onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="pin">PIN di accesso</label>
        <input type="password" id="pin" placeholder="Inserisci il PIN" required autofocus>
      </div>
      <button type="submit">Accedi</button>
    </form>

    <div class="back-link">
      <a href="/">← Torna alla home</a>
    </div>
  </div>

  <script src="/js/admin-auth.js"></script>
  <script>
    function handleLogin(event) {
      event.preventDefault();
      const pin = document.getElementById('pin').value;
      const errorEl = document.getElementById('error');

      if (window.__ADMIN_AUTH__.authenticate(pin)) {
        window.location.replace('/admin/index.html');
      } else {
        errorEl.style.display = 'block';
        document.getElementById('pin').value = '';
      }
    }

    // Se già autenticato, va direttamente al dashboard
    if (window.__ADMIN_AUTH__.isAuthenticated()) {
      window.location.replace('/admin/index.html');
    }
  </script>
</body>
</html>
