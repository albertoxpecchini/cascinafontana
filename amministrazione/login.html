<!DOCTYPE html>
<html lang="it" style="color-scheme: light;">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light">
<meta name="robots" content="noindex, nofollow">
<title>Console Operativa · Accesso · Cascina Fontana</title>
<link rel="icon" type="image/jpeg" sizes="128x128" href="/risorse/immagini/flash_128.jpg">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: { extend: {
      colors: {
        primary: '#0052ff', 'primary-dark': '#578bfa',
        'dark-bg': '#ffffff', 'dark-card': '#eef0f3',
        'dark-text': '#0a0b0d', 'dark-muted': '#5b616e',
        'dark-border': 'rgba(91, 97, 110, 0.2)'
      },
      fontFamily: {
        sans: ['Public Sans','system-ui','sans-serif'],
        heading: ['Manrope','Public Sans','sans-serif']
      }
    } }
  };
</script>
<style>
  body { font-family: 'Public Sans', system-ui, sans-serif; background: #ffffff; color: #0a0b0d; }
  .font-heading { font-family: 'Manrope','Public Sans',sans-serif; letter-spacing: -0.04em; }
  .gradient-text {
    background: linear-gradient(135deg, #0052ff 0%, #578bfa 100%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent; color: transparent;
  }
  .glass {
    background: rgba(255, 255, 255, 0.96);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(91, 97, 110, 0.2);
    border-radius: 32px;
    box-shadow: 0 20px 48px rgba(10, 11, 13, 0.06);
  }
  .bg-grid {
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -20%, rgba(0, 82, 255, 0.12), transparent),
      linear-gradient(rgba(0, 82, 255, 0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 82, 255, 0.04) 1px, transparent 1px);
    background-size: 100% 100%, 40px 40px, 40px 40px;
  }
</style>
</head>
<body class="min-h-screen flex items-center justify-center bg-dark-bg text-dark-text bg-grid px-4">

<div class="w-full max-w-md">
  <a href="/" class="flex items-center gap-3 justify-center mb-8 group">
    <span class="w-10 h-10 rounded-full bg-dark-card border border-dark-border flex items-center justify-center font-heading font-bold text-primary text-sm">CF</span>
    <span class="font-heading font-bold text-lg group-hover:text-primary transition">Cascina Fontana</span>
  </a>

  <div class="glass rounded-2xl p-6 sm:p-8">
    <div class="text-center mb-6">
      <div class="inline-block text-xs font-medium text-primary mb-2 tracking-[0.18em] uppercase">Console operativa</div>
      <h1 class="font-heading text-2xl sm:text-3xl font-bold">
        Accedi alla <span class="gradient-text">console</span>
      </h1>
      <p class="text-sm text-dark-muted mt-3">Accesso riservato alla gestione annunci e al registro aggiornamenti della cascina.</p>
    </div>

    <form id="loginForm" class="space-y-4" novalidate>
      <div>
        <label for="email" class="block text-xs font-medium text-dark-muted mb-1">Email</label>
        <input type="email" id="email" name="email" required autocomplete="email"
          class="w-full px-3 py-2.5 rounded-lg bg-dark-bg border border-dark-border text-dark-text focus:border-primary focus:outline-none transition">
      </div>
      <div>
        <label for="password" class="block text-xs font-medium text-dark-muted mb-1">Password</label>
        <input type="password" id="password" name="password" required autocomplete="current-password"
          class="w-full px-3 py-2.5 rounded-lg bg-dark-bg border border-dark-border text-dark-text focus:border-primary focus:outline-none transition">
      </div>
      <div id="loginError" class="hidden text-sm text-red-400 bg-red-500/10 border border-red-500/20 rounded-lg px-3 py-2"></div>
      <button type="submit" id="loginBtn"
        class="w-full px-6 py-3 rounded-full bg-primary text-white font-semibold hover:bg-primary-dark transition-all shadow-lg shadow-primary/20 disabled:opacity-50">
        Accedi
      </button>
    </form>
  </div>

  <p class="text-center text-xs text-dark-muted mt-6">
    <a href="/" class="hover:text-primary transition">← Torna al sito</a>
  </p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/moduli/supabase-client.js"></script>
<script>
  const form  = document.getElementById('loginForm');
  const errEl = document.getElementById('loginError');
  const btn   = document.getElementById('loginBtn');

  function showError(msg) {
    errEl.textContent = msg;
    errEl.classList.remove('hidden');
  }

  // Redirect if already logged
  (async () => {
    if (!window.sb) { showError('Backend non configurato. Vedi moduli/supabase-client.js'); return; }
    const { data } = await window.sb.auth.getSession();
    if (data.session) window.location.href = '/amministrazione/';
  })();

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errEl.classList.add('hidden');
    if (!window.sb) { showError('Backend non configurato.'); return; }
    btn.disabled = true;
    btn.textContent = 'Accesso…';
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const { error } = await window.sb.auth.signInWithPassword({ email, password });
    if (error) {
      showError(error.message);
      btn.disabled = false;
      btn.textContent = 'Accedi';
      return;
    }
    window.location.href = '/amministrazione/';
  });
</script>

</body>
</html>
